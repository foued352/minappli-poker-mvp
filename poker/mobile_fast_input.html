<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Fast Input</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #04090f;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    #app {
      width: 100%; height: 100%;
      max-width: 420px; margin: 0 auto;
      display: flex; flex-direction: column;
      padding-top: 30px;
    }

    /* ══ STACK BAR ══ */
    #stack-bar {
      flex-shrink: 0;
      display: flex; gap: 6px; justify-content: center; align-items: center;
      padding: 7px 16px;
      background: rgba(0,0,0,0.45);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stack-btn {
      padding: 4px 13px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: transparent;
      color: rgba(255,255,255,0.38); font-size: 11px; font-weight: 700;
      cursor: pointer; user-select: none; letter-spacing: 0.04em;
      touch-action: manipulation;
      transition: all 0.08s;
    }
    .stack-btn.active { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.90); border-color: rgba(255,255,255,0.28); }

    /* ══ TABLE SCENE — fond sombre de la salle ══ */
    #table-scene {
      flex: 1; min-height: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #050a0e;
      overflow: hidden;
    }
    #table-scene::before { display: none; }

    /* ══ POKER TABLE — bloc visuel dédié ══ */
    /* Couche 1 : surface intérieure (felt vert) */
    /* Couche 2 : contour / rail (border) */
    #poker-table {
      position: absolute; z-index: 0; pointer-events: none;
      left: 8%; right: 8%; top: 12%; bottom: 14%;
      border-radius: 50%;
      background: radial-gradient(ellipse 84% 84% at 50% 52%,
        #1e3d28 0%, #122416 55%, #0a1810 100%);
      border: 3px solid rgba(190,205,190,0.30);
      box-shadow:
        inset 0 0 70px rgba(0,0,0,0.48),
        inset 0 -25px 55px rgba(0,0,0,0.22),
        0 0 0 1px rgba(0,0,0,0.65),
        0 8px 36px rgba(0,0,0,0.75);
    }

    /* ══ POSITION BUTTONS ══ */
    .pos-btn {
      position: absolute; z-index: 3;
      width: 74px; height: 74px; border-radius: 50%; padding: 0;
      border: 2px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.60);
      color: rgba(255,255,255,0.65);
      font-size: 13px; font-weight: 900; letter-spacing: 0.04em;
      cursor: pointer; user-select: none; touch-action: manipulation;
      transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.50);
    }
    .pos-btn:active { opacity: 0.68; }

    /* Dealer button */
    #dealer-btn {
      position: absolute; z-index: 4;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; color: #1a1a1a;
      font-size: 10px; font-weight: 900; letter-spacing: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0.50;
      box-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    /* P6 — HERO: remplissage plein, immédiatement lisible */
    .pos-btn.hero {
      background: rgba(255,210,0,0.22);
      border-color: rgba(255,210,0,0.80);
      color: rgba(255,210,0,0.98);
      box-shadow: 0 0 14px rgba(255,210,0,0.15);
    }
    /* P6 — VILLAIN */
    .pos-btn.villain {
      background: rgba(255,70,50,0.22);
      border-color: rgba(255,80,60,0.85);
      color: #ff6040;
      box-shadow: 0 0 12px rgba(255,60,40,0.18);
    }
    /* positions non actives : quasi-invisibles, décoratif pur */
    .pos-btn.dim { opacity: 0.18; }
    .pos-btn { transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s, opacity 0.12s; }

    /* ══ CENTER ZONE ══ */
    #center-zone {
      position: relative; z-index: 6;
      width: 74%;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      padding: 20px 0 80px;
    }

    /* Context line — secondaire, ne concurrence pas le grid */
    #ctx-line {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.45); letter-spacing: 0.06em;
      text-align: center; white-space: nowrap;
    }
    #ctx-line.prompt {
      font-size: 10px; font-weight: 600; letter-spacing: 0.10em;
      color: rgba(255,255,255,0.18); text-transform: uppercase;
    }

    /* ══ CARDS ══ */
    #cards-row {
      display: flex; gap: 10px; align-items: flex-end; justify-content: center;
      perspective: 600px;
    }
    /* V4 — cartes importantes mais secondaires */
    .card {
      width: 72px; height: 100px; border-radius: 8px;
      position: relative; display: flex; align-items: center; justify-content: center;
      user-select: none; cursor: pointer; touch-action: manipulation;
    }
    .card[data-state="up"]:active { transform: scale(0.91); }
    /* cartes fermées : visuellement passives — le grid est l'entrée principale */
    .card[data-state="down"] {
      background: linear-gradient(150deg, #8a0000 0%, #6a0000 55%, #550000 100%);
      border: 1.5px solid rgba(255,255,255,0.18);
      box-shadow: 0 4px 10px rgba(0,0,0,0.55);
      opacity: 0.50;
    }
    .card[data-state="down"]::before {
      content: ""; position: absolute; inset: 5px;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
      background: repeating-linear-gradient(45deg,
        rgba(255,255,255,0.045) 0px, rgba(255,255,255,0.045) 1px,
        transparent 1px, transparent 6px);
    }
    .card[data-state="down"] .card-rank-center,
    .card[data-state="down"] .card-corner-tl,
    .card[data-state="down"] .card-corner-br { display: none; }

    .card[data-state="up"] {
      background: #f4f5f7;
      border: 1px solid rgba(200,210,230,0.45);
      box-shadow: 0 6px 16px rgba(0,0,0,0.55);
      opacity: 1;  /* overrides face-down opacity */
    }
    .card[data-state="up"].sel {
      border: 2px solid rgba(255,210,0,0.80);
      box-shadow: 0 0 0 3px rgba(255,210,0,0.12), 0 6px 16px rgba(0,0,0,0.55);
    }
    @keyframes card-flip {
      0%   { transform: rotateY(90deg) scale(0.90); opacity: 0.3; }
      55%  { transform: rotateY(-4deg) scale(1.05); opacity: 1; }
      100% { transform: rotateY(0deg)  scale(1.0);  opacity: 1; }
    }
    .card.flipping { animation: card-flip 0.16s ease-out; }

    .card[data-state="up"] .card-rank-center {
      font-size: 34px; font-weight: 900; color: #1a1f2e; line-height: 1;
    }
    /* P5 — coin de carte : rang + suit sur 2 lignes */
    .card[data-state="up"] .card-corner-tl {
      position: absolute; top: 5px; left: 7px;
      display: flex; flex-direction: column; align-items: flex-start;
      color: #1a1f2e; line-height: 1;
    }
    .card[data-state="up"] .card-corner-br {
      position: absolute; bottom: 5px; right: 7px;
      display: flex; flex-direction: column; align-items: flex-end;
      color: #1a1f2e; line-height: 1;
      transform: rotate(180deg);
    }
    .c-rank { font-size: 10px; font-weight: 800; line-height: 1; }
    .c-suit  { font-size: 7px;  font-weight: 700; line-height: 1; }

    /* ══ RANK GRID — outil secondaire, en bas ══ */
    #rank-grid {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center; width: 100%;
    }
    .rank-btn {
      /* à 74% de 420px : (311px - 36px) / 7 ≈ 39px par bouton */
      width: calc((100% - 36px) / 7);
      aspect-ratio: 1; border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.72);
      font-size: clamp(12px, 3.6vw, 16px); font-weight: 800;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      transition: background 0.07s, transform 0.07s, border-color 0.07s, color 0.07s;
    }
    .rank-btn:active { transform: scale(0.82); color: #fff; background: rgba(255,255,255,0.22); }

    .rank-btn.sel-1 {
      background: rgba(255,210,0,0.90) !important;
      color: #1a1200 !important;
      border-color: rgba(255,210,0,1) !important;
      box-shadow: 0 0 14px rgba(255,210,0,0.28) !important;
    }
    .rank-btn.sel-2 {
      background: rgba(255,210,0,0.38) !important;
      color: #fff5b0 !important;
      border-color: rgba(255,210,0,0.72) !important;
    }
    .decided #rank-grid .rank-btn { opacity: 0.32; }

    /* ══ SUITED TOGGLE ══ */
    #suited-row {
      display: flex; justify-content: center; align-items: center; min-height: 34px;
    }
    #suited-row.hidden { visibility: hidden; pointer-events: none; }
    #btn-suited {
      padding: 6px 22px; border-radius: 9px;
      border: 1.5px solid rgba(255,255,255,0.26);
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.50);
      font-size: 12px; font-weight: 800; letter-spacing: 0.10em;
      min-width: 96px;
      cursor: pointer; user-select: none; touch-action: manipulation;
      transition: background 0.08s, color 0.08s, border-color 0.08s;
    }
    #btn-suited.suited {
      background: rgba(255,255,255,0.20); color: #fff;
      border-color: rgba(255,255,255,0.55);
    }

    /* ══ RESULT ZONE ══ */
    /* P3 — action plus isolée : marges verticales pour respirer */
    #result-zone {
      display: flex; flex-direction: column;
      align-items: center; gap: 2px; text-align: center;
      height: 96px; overflow: visible; justify-content: center; cursor: pointer;
      margin-top: 4px; margin-bottom: 4px;
    }
    #actions-row {
      display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;
    }
    .action-chip {
      font-size: clamp(56px, 18vw, 80px); font-weight: 900;
      letter-spacing: 0.04em; line-height: 1;
    }
    #result-reason, #result-tap-hint { display: none !important; }
    /* idle-hint : supprimé visuellement — le grid parle seul */
    #idle-hint { font-size: 0; height: 0; overflow: hidden; margin: 0; padding: 0; }
    /* V4 — range-hint : séparation visuelle avant le grid */
    #range-hint {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.55); letter-spacing: 0.04em;
      text-align: center;
      height: 18px; overflow: hidden; white-space: nowrap;
      margin-top: 8px;
    }

    @keyframes pop-in {
      from { transform: scale(0.78); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .pop-in { animation: pop-in 0.16s cubic-bezier(0.28, 1.7, 0.58, 1); }

    /* ══ CALIBRATION MODE ══ */
    /* cal-mode : overlay + rail uniquement, labels masqués */
    body.cal-mode .pos-btn { font-size: 0 !important; }
    /* rail-mode : sièges et dealer masqués → fond + overlay + rail seul */
    body.rail-mode .pos-btn,
    body.rail-mode #dealer-btn { display: none !important; }
    /* ══ CALIBRATION IMAGE ══ */
    #cal-img {
      position: absolute; inset: 0; z-index: 1;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      opacity: 0.42; pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

<div id="app">

  <div id="stack-bar"></div>

  <!-- MARQUEUR TEMPORAIRE — retirer après validation -->
  <div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#e84040;color:#fff;font-size:11px;font-weight:900;text-align:center;letter-spacing:0.12em;padding:3px 0;pointer-events:none;">
    FLOW V2 — P5/P6/P7/P8/P10
  </div>

  <div id="table-scene">

    <div id="poker-table"></div>

    <img id="cal-img" alt="winamax ref">

    <button class="pos-btn" id="pos-UTG" data-pos="UTG">UTG</button>
    <button class="pos-btn" id="pos-HJ"  data-pos="HJ">HJ</button>
    <button class="pos-btn" id="pos-CO"  data-pos="CO">CO</button>
    <button class="pos-btn" id="pos-SB"  data-pos="SB">SB</button>
    <button class="pos-btn" id="pos-BB"  data-pos="BB">BB</button>
    <button class="pos-btn" id="pos-BTN" data-pos="BTN">BTN</button>
    <div id="dealer-btn">D</div>

    <div id="center-zone">

      <!-- contexte léger -->
      <div id="ctx-line" class="prompt">Choisissez votre position</div>

      <!-- confirmation : cartes sélectionnées -->
      <div id="cards-row">
        <div class="card" id="card1" data-state="down">
          <span class="card-corner-tl"><span class="c-rank"></span><span class="c-suit"></span></span>
          <span class="card-rank-center"></span>
          <span class="card-corner-br"><span class="c-rank"></span><span class="c-suit"></span></span>
        </div>
        <div class="card" id="card2" data-state="down">
          <span class="card-corner-tl"><span class="c-rank"></span><span class="c-suit"></span></span>
          <span class="card-rank-center"></span>
          <span class="card-corner-br"><span class="c-rank"></span><span class="c-suit"></span></span>
        </div>
      </div>

      <div id="suited-row" class="hidden">
        <button id="btn-suited">OFF</button>
      </div>

      <!-- OUTPUT : action dominant -->
      <div id="result-zone">
        <div id="actions-row" style="display:none;"></div>
        <div id="result-reason" style="display:none;"></div>
        <div id="idle-hint">Choisissez une carte</div>
        <div id="result-tap-hint" style="display:none;">tap pour rejouer</div>
      </div>

      <div id="range-hint"></div>

      <!-- INPUT SECONDAIRE : outil de sélection, en bas -->
      <div id="rank-grid"></div>

    </div>
  </div>

</div>

<script src="../mobile_fast_input_ranges.js"></script>
<script>
"use strict";

/* ── RANGES ── */
const RANGES = {};
for (const [stack, positions] of Object.entries(MFI_RANGES_RAW)) {
  RANGES[stack] = {};
  for (const [pos, buckets] of Object.entries(positions)) {
    RANGES[stack][pos] = {
      open:     new Set(buckets.open     || []),
      call:     new Set(buckets.call     || []),
      threebet: new Set(buckets.threebet || []),
    };
  }
}
const VSOPEN = {};
for (const [stack, positions] of Object.entries(MFI_VSOPEN_RAW)) {
  VSOPEN[stack] = {};
  for (const [pos, buckets] of Object.entries(positions)) {
    VSOPEN[stack][pos] = {
      call:     new Set(buckets.call     || []),
      threebet: new Set(buckets.threebet || []),
    };
  }
}

/* ── CONSTANTS ── */
const STACKS    = ["20bb","25bb","40bb"];
const POSITIONS = ["UTG","HJ","CO","BTN","SB","BB"];
const RANKS     = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];

/* ── SEAT GEOMETRY ── */
/* ── LAYOUT — lit le builder localStorage, fallback hardcodé ── */
const DEFAULT_LAYOUT = {
  table: { cx: 50.5, cy: 49.0, rx: 41.5, ry: 37.0 },
  seats: {
    SB:  { x: 17.0, y: 87.5 },
    BB:  { x: 13.8, y: 39.5 },
    UTG: { x: 15.0, y: 22.0 },
    HJ:  { x: 50.5, y:  9.0 },
    CO:  { x: 82.8, y: 22.0 },
    BTN: { x: 83.5, y: 40.5 },
  }
};
let LAYOUT = DEFAULT_LAYOUT;
try {
  const _saved = localStorage.getItem("minappli.poker.layout.builder.v1");
  if (_saved) LAYOUT = JSON.parse(_saved);
} catch(_) {}

// Applique la table ellipse depuis LAYOUT.table
(function() {
  const t  = LAYOUT.table;
  const el = document.getElementById("poker-table");
  if (!el) return;
  el.style.left   = (t.cx - t.rx) + "%";
  el.style.right  = (100 - t.cx - t.rx) + "%";
  el.style.top    = (t.cy - t.ry) + "%";
  el.style.bottom = (100 - t.cy - t.ry) + "%";
})();

// SLOTS dérivés de LAYOUT.seats
// Mapping : SLOT_ORDER[i] = GAME_ORDER[(i+1)%6] quand hero=SB
const _SEAT_FOR_SLOT = ["SB","BB","UTG","HJ","CO","BTN"];
const SLOT_ORDER     = ["lower_left","mid_left","upper_left","top","upper_right","mid_right"];
const SLOTS = {};
SLOT_ORDER.forEach((slot, i) => {
  const s = LAYOUT.seats[_SEAT_FOR_SLOT[i]];
  SLOTS[slot] = { x: s.x + "%", y: s.y + "%" };
});

// REMAP : positions poker dynamiques
// Ordre circulaire poker 6-max
const GAME_ORDER = ["BTN","SB","BB","UTG","HJ","CO"];

function applyPositions() {
  // heroIdx défaut = 3 (UTG) → layout naturel Winamax : UTG bas-gauche, BTN haut
  const heroIdx = heroPos ? GAME_ORDER.indexOf(heroPos) : 3;

  POSITIONS.forEach(p => {
    const rotIdx = (GAME_ORDER.indexOf(p) - heroIdx + 6) % 6;
    const coords = SLOTS[SLOT_ORDER[rotIdx]];
    const btn    = document.getElementById("pos-" + p);
    btn.style.left      = coords.x;
    btn.style.top       = coords.y;
    btn.style.right     = "";
    btn.style.bottom    = "";
    btn.style.transform = "translate(-50%, -50%)";
  });

  // Dealer button: tangent haut-droit du BTN réel
  requestAnimationFrame(placeDealerBtn);
}

function placeDealerBtn() {
  const db    = document.getElementById("dealer-btn");
  const btnEl = document.getElementById("pos-BTN");
  const scene = document.getElementById("table-scene");
  if (!db || !btnEl || !scene) return;
  const sr = scene.getBoundingClientRect();
  const br = btnEl.getBoundingClientRect();
  const bx = (br.left + br.right)  / 2 - sr.left;
  const by = (br.top  + br.bottom) / 2 - sr.top;
  const r  = br.width / 2;
  // Direction BTN → centre de table, D posé juste au bord intérieur du cercle
  const cx = sr.width  / 2;
  const cy = sr.height / 2;
  const dx = cx - bx, dy = cy - by;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  // Perpendiculaire au vecteur BTN→centre (rotation 90° horaire)
  // D posé sur le côté de BTN, jamais dans l'axe centre-zone
  const px =  dy / dist;
  const py = -dx / dist;
  db.style.left = Math.round(bx + px * r * 0.8 - 11) + "px";
  db.style.top  = Math.round(by + py * r * 0.8 - 11) + "px";
}

const OPENER_OPTIONS = {
  UTG: [], HJ: ["UTG"], CO: ["UTG","HJ"], BTN: ["UTG","HJ","CO"],
  SB: ["CO","BTN"], BB: ["UTG","HJ","CO","BTN","SB"],
};
const MODE_ALLOWED = {
  UTG: ["open"], HJ: ["open","vsopen"], CO: ["open","vsopen"],
  BTN: ["open","vsopen"], SB: ["open","vsopen"], BB: ["vsopen"],
};

const ACTION_DISPLAY = {
  FOLD:   { label: "FOLD",  color: "#8090b8" },
  CALL:   { label: "CALL",  color: "#f5a623" },
  OPEN:   { label: "OPEN",  color: "#22c55e" },
  "3BET": { label: "3BET",  color: "#e84040" },
};
const REASON = {
  FOLD:   "Hors de la range",
  CALL:   "Main correcte dans ce spot",
  OPEN:   "Spot standard — première mise",
  "3BET": "Main forte — pression maximale",
};

/* ── STATE ── */
let activeStack  = "40bb";
let heroPos      = "UTG";
let villainPos   = null;
let activeMode   = "open";
let activeOpener = null;
let rank1 = null, rank2 = null;
let suited = false;
let handStep = "idle"; // idle | picked1 | done

/* ── DOM ── */
const EL = {};

function init() {
  EL.stackBar     = document.getElementById("stack-bar");
  EL.rankGrid     = document.getElementById("rank-grid");
  EL.card1        = document.getElementById("card1");
  EL.card2        = document.getElementById("card2");
  EL.suitedRow    = document.getElementById("suited-row");
  EL.btnSuited    = document.getElementById("btn-suited");
  EL.actionsRow   = document.getElementById("actions-row");
  EL.resultReason = document.getElementById("result-reason");
  EL.idleHint     = document.getElementById("idle-hint");
  EL.tapHint      = document.getElementById("result-tap-hint");
  EL.rangeHint    = document.getElementById("range-hint");
  EL.ctxLine      = document.getElementById("ctx-line");
  EL.centerZone   = document.getElementById("center-zone");

  buildStackBar();
  buildRankGrid();

  POSITIONS.forEach(p => {
    document.getElementById("pos-" + p).addEventListener("click", () => onPosTap(p));
  });
  EL.btnSuited.addEventListener("click", toggleSuited);
  EL.card1.addEventListener("click", onCard1Tap);
  EL.card2.addEventListener("click", onCard2Tap);
  document.getElementById("result-zone").addEventListener("click", () => {
    if (handStep === "done") resetHand();
  });

  applyPositions();
  updateMode();
  updateCtxLine();
  updatePosHighlights();
  window.addEventListener("resize", placeDealerBtn);
}

/* ── STACK BAR ── */
function buildStackBar() {
  STACKS.forEach(s => {
    const b = document.createElement("button");
    b.className = "stack-btn" + (s === activeStack ? " active" : "");
    b.textContent = s;
    b.addEventListener("click", () => {
      activeStack = s;
      EL.stackBar.querySelectorAll(".stack-btn").forEach(x =>
        x.classList.toggle("active", x.textContent === s));
      /* P8 — mise à jour immédiate ctx-line + recalcul si main sélectionnée */
      updateCtxLine();
      if (handStep === "done") recompute();
    });
    EL.stackBar.appendChild(b);
  });
}

/* ── RANK GRID ── */
function buildRankGrid() {
  RANKS.forEach(r => {
    const b = document.createElement("button");
    b.className = "rank-btn"; b.id = "rank-" + r; b.textContent = r;
    b.addEventListener("click", () => onRankTap(r));
    EL.rankGrid.appendChild(b);
  });
}

/* ── POSITION LOGIC ── */
function onPosTap(pos) {
  if (pos === heroPos) {
    if (villainPos !== null) {
      // Hero click with villain → remove villain only
      villainPos = null;
    } else {
      // Hero click alone → reset hand, keep hero
      resetHand();
    }
    updateMode();
    updateCtxLine();
    updatePosHighlights();
    applyPositions();
    if (handStep === "done") recompute();
    return;
  }

  // Non-hero click: no villain yet → switch hero; villain exists → change villain
  if (villainPos === null) {
    heroPos = pos;
  } else {
    villainPos = pos;
  }
  updateMode();
  updateCtxLine();
  updatePosHighlights();
  applyPositions();
  if (handStep === "done") recompute();
}

function updateMode() {
  if (heroPos === null) { activeMode = "open"; activeOpener = null; return; }
  const allowed = MODE_ALLOWED[heroPos] || ["open"];
  if (villainPos !== null
      && allowed.includes("vsopen")
      && (OPENER_OPTIONS[heroPos] || []).includes(villainPos)) {
    activeMode   = "vsopen";
    activeOpener = villainPos;
  } else {
    activeMode   = allowed.includes("open") ? "open" : "vsopen";
    activeOpener = null;
  }
}

function updateCtxLine() {
  if (heroPos === null) {
    EL.ctxLine.className = "prompt";
    EL.ctxLine.textContent = "Choisissez votre position";
    return;
  }
  EL.ctxLine.className = "";
  let t = heroPos;
  if (activeMode === "vsopen" && activeOpener) t += " vs " + activeOpener;
  t += "  •  " + activeStack;
  EL.ctxLine.textContent = t;
}

function updatePosHighlights() {
  POSITIONS.forEach(p => {
    const btn = document.getElementById("pos-" + p);
    btn.classList.remove("hero", "villain", "dim");
    if      (p === heroPos)    btn.classList.add("hero");
    else if (p === villainPos) btn.classList.add("villain");
    else                       btn.classList.add("dim");
  });
}

/* ── RANK TAP ── */
function onRankTap(rank) {
  if (handStep === "idle") {
    rank1 = rank; rank2 = null; resetSuited();
    handStep = "picked1";
    setCard(EL.card1, "up", rank); EL.card1.classList.add("sel");
    EL.suitedRow.classList.add("hidden");
    highlightRanks();
    EL.idleHint.textContent = "Choisissez la 2ème carte";
    EL.idleHint.style.display = "";
    return;
  }

  if (handStep === "picked1") {
    rank2 = rank; handStep = "done";
    setCard(EL.card2, "up", rank); EL.card2.classList.add("sel");
    canonicalizeDisplay();
    applySuitedVisibility();
    highlightRanks();
    EL.idleHint.style.display = "none";
    recompute();
    return;
  }

  if (handStep === "editing1") {
    rank1 = rank; handStep = "done";
    setCard(EL.card1, "up", rank); EL.card1.classList.add("sel");
    canonicalizeDisplay();
    applySuitedVisibility();
    highlightRanks();
    EL.idleHint.style.display = "none";
    recompute();
    return;
  }

  if (handStep === "editing2") {
    rank2 = rank; handStep = "done";
    setCard(EL.card2, "up", rank); EL.card2.classList.add("sel");
    canonicalizeDisplay();
    applySuitedVisibility();
    highlightRanks();
    EL.idleHint.style.display = "none";
    recompute();
    return;
  }

  if (handStep === "done") {
    // New hand from scratch
    resetVisuals(); hideResult();
    setCard(EL.card2, "down", null);
    EL.suitedRow.classList.add("hidden");
    rank1 = rank; rank2 = null; resetSuited();
    handStep = "picked1";
    setCard(EL.card1, "up", rank); EL.card1.classList.add("sel");
    highlightRanks();
    EL.idleHint.textContent = "Choisissez la 2ème carte";
    EL.idleHint.style.display = "";
  }
}

function canonicalizeDisplay() {
  if (rank1 === null || rank2 === null || rank1 === rank2) return;
  const i1 = RANKS.indexOf(rank1), i2 = RANKS.indexOf(rank2);
  if (i1 > i2) {
    [rank1, rank2] = [rank2, rank1];
    setCard(EL.card1, "up", rank1); EL.card1.classList.add("sel");
    setCard(EL.card2, "up", rank2); EL.card2.classList.add("sel");
  }
}

function applySuitedVisibility() {
  if (rank1 === rank2) {
    resetSuited();
    EL.suitedRow.classList.add("hidden");
  } else {
    EL.suitedRow.classList.remove("hidden");
  }
}

/* ── CARD TAP ── */
function onCard1Tap() {
  if (handStep === "picked1") {
    // Cancel card1
    rank1 = null;
    setCard(EL.card1, "down", null);
    highlightRanks();
    handStep = "idle";
    EL.idleHint.textContent = "Choisissez une carte";
    return;
  }
  if (handStep === "done" || handStep === "editing2") {
    rank1 = null;
    setCard(EL.card1, "down", null);
    EL.suitedRow.classList.add("hidden");
    hideResult();
    highlightRanks();
    handStep = "editing1";
    EL.idleHint.textContent = "Choisissez la 1ère carte";
    EL.idleHint.style.display = "";
  }
}

function onCard2Tap() {
  if (handStep === "done" || handStep === "editing1") {
    rank2 = null;
    setCard(EL.card2, "down", null);
    EL.suitedRow.classList.add("hidden");
    hideResult();
    highlightRanks();
    handStep = "editing2";
    EL.idleHint.textContent = "Choisissez la 2ème carte";
    EL.idleHint.style.display = "";
  }
}

/* ── SUITED ── */
function toggleSuited() {
  suited = !suited;
  EL.btnSuited.textContent = suited ? "SUITED" : "OFF";
  EL.btnSuited.classList.toggle("suited", suited);
  /* P5 — mettre à jour couleur cartes immédiatement */
  applyCardColors();
  if (handStep === "done") recompute();
}

function resetSuited() {
  suited = false;
  EL.btnSuited.textContent = "OFF";
  EL.btnSuited.classList.remove("suited");
}

/* ── CARDS ── */
function setCard(el, state, rank) {
  const wasDown = el.dataset.state !== "up";
  el.dataset.state = state;
  el.classList.remove("sel");
  const rankEl  = el.querySelector(".card-rank-center");
  const tlRank  = el.querySelector(".card-corner-tl .c-rank");
  const tlSuit  = el.querySelector(".card-corner-tl .c-suit");
  const brRank  = el.querySelector(".card-corner-br .c-rank");
  const brSuit  = el.querySelector(".card-corner-br .c-suit");
  if (state === "up" && rank) {
    rankEl.textContent = rank;
    if (tlRank) tlRank.textContent = rank;
    if (brRank) brRank.textContent = rank;
    /* reset suit — applyCardColors() will fill it when both cards ready */
    if (tlSuit) tlSuit.textContent = "";
    if (brSuit) brSuit.textContent = "";
    /* reset colors to default dark */
    [rankEl, tlRank, brRank].forEach(e => { if (e) e.style.color = ""; });
    if (wasDown) { el.classList.remove("flipping"); void el.offsetWidth; el.classList.add("flipping"); }
  } else {
    [rankEl, tlRank, brRank].forEach(e => { if (e) { e.textContent = ""; e.style.color = ""; } });
    if (tlSuit) tlSuit.textContent = "";
    if (brSuit) brSuit.textContent = "";
    el.classList.remove("flipping");
  }
}

/* P5 — Cartes intelligentes: suited=même couleur, off=rouge+noir ── */
function applyFaceColor(el, suit, color) {
  const rankEl = el.querySelector(".card-rank-center");
  const tlRank = el.querySelector(".card-corner-tl .c-rank");
  const tlSuit = el.querySelector(".card-corner-tl .c-suit");
  const brRank = el.querySelector(".card-corner-br .c-rank");
  const brSuit = el.querySelector(".card-corner-br .c-suit");
  [rankEl, tlRank, brRank].forEach(e => { if (e) e.style.color = color; });
  if (tlSuit) { tlSuit.textContent = suit; tlSuit.style.color = color; }
  if (brSuit) { brSuit.textContent = suit; brSuit.style.color = color; }
}

function applyCardColors() {
  /* Seulement quand les deux rangs sont connus */
  if (rank1 === null || rank2 === null) return;
  const RED = "#c62828"; const BLK = "#374151";
  let c1, c2;
  if (rank1 === rank2) {
    /* paire : une rouge, une noire (neutre) */
    c1 = { suit: "♥", color: RED }; c2 = { suit: "♠", color: BLK };
  } else if (suited) {
    /* suited : même couleur (rouge ♥) */
    c1 = { suit: "♥", color: RED }; c2 = { suit: "♥", color: RED };
  } else {
    /* offsuit : rouge + noire */
    c1 = { suit: "♥", color: RED }; c2 = { suit: "♠", color: BLK };
  }
  if (EL.card1.dataset.state === "up") applyFaceColor(EL.card1, c1.suit, c1.color);
  if (EL.card2.dataset.state === "up") applyFaceColor(EL.card2, c2.suit, c2.color);
}

function highlightRanks() {
  EL.rankGrid.querySelectorAll(".rank-btn").forEach(b => {
    b.classList.remove("sel-1","sel-2");
    const r = b.textContent;
    if (rank1 !== null && r === rank1 && r === rank2) { b.classList.add("sel-1"); return; }
    if (rank1 !== null && r === rank1) b.classList.add("sel-1");
    if (rank2 !== null && r === rank2) b.classList.add("sel-2");
  });
}

function resetVisuals() {
  EL.rankGrid.querySelectorAll(".rank-btn").forEach(b => b.classList.remove("sel-1","sel-2"));
  EL.card1.classList.remove("sel");
  EL.card2.classList.remove("sel");
}

/* ── RESET ── */
function resetHand() {
  rank1 = null; rank2 = null; suited = false;
  handStep = "idle";
  setCard(EL.card1, "down", null);
  setCard(EL.card2, "down", null);
  resetVisuals();
  EL.suitedRow.classList.add("hidden");
  resetSuited();
  hideResult();
  if (heroPos !== null) {
    EL.idleHint.textContent = "Choisissez une carte";
    EL.idleHint.style.display = "";
  }
}

function hideResult() {
  EL.actionsRow.style.display   = "none";
  EL.resultReason.style.display = "none";
  EL.tapHint.style.display      = "none";
  EL.idleHint.style.display     = "";
  EL.rangeHint.textContent      = "";
  EL.centerZone.classList.remove("decided");
}

/* P7 — Vraie compression range en notation poker standard ── */
function buildRangeHint(hands) {
  if (!hands || !hands.length) return "";
  const set = new Set(hands);
  const RH  = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
  const out = [];

  /* 1 — Paires : groupes consécutifs */
  const pidxs = RH.map((r, i) => set.has(r + r) ? i : -1).filter(i => i >= 0);
  for (let k = 0; k < pidxs.length; ) {
    let s = pidxs[k], e = s;
    while (k + 1 < pidxs.length && pidxs[k + 1] === e + 1) { k++; e = pidxs[k]; }
    if      (s === e)    out.push(RH[s] + RH[s]);
    else if (s === 0)    out.push(RH[e] + RH[e] + "+");
    else                 out.push(RH[s] + RH[s] + "-" + RH[e] + RH[e]);
    k++;
  }

  /* 2 — Suited */
  for (let i = 0; i < RH.length; i++) {
    const r1 = RH[i], sec = [];
    for (let j = i + 1; j < RH.length; j++)
      if (set.has(r1 + RH[j] + "s")) sec.push(j);
    for (let k = 0; k < sec.length; ) {
      let s = sec[k], e = s;
      while (k + 1 < sec.length && sec[k + 1] === e + 1) { k++; e = sec[k]; }
      if      (s === i + 1 && s !== e) out.push(r1 + RH[e] + "s+");
      else if (s !== e)                out.push(r1 + RH[s] + "s-" + r1 + RH[e] + "s");
      else                             out.push(r1 + RH[s] + "s");
      k++;
    }
  }

  /* 3 — Offsuit */
  for (let i = 0; i < RH.length; i++) {
    const r1 = RH[i], sec = [];
    for (let j = i + 1; j < RH.length; j++)
      if (set.has(r1 + RH[j] + "o")) sec.push(j);
    for (let k = 0; k < sec.length; ) {
      let s = sec[k], e = s;
      while (k + 1 < sec.length && sec[k + 1] === e + 1) { k++; e = sec[k]; }
      if      (s === i + 1 && s !== e) out.push(r1 + RH[e] + "o+");
      else if (s !== e)                out.push(r1 + RH[s] + "o-" + r1 + RH[e] + "o");
      else                             out.push(r1 + RH[s] + "o");
      k++;
    }
  }

  /* Troncature douce à ~70 chars (une seule ligne visible) */
  let result = "";
  for (const p of out) {
    const next = result ? result + " • " + p : p;
    if (next.length > 70) { result += " …"; break; }
    result = next;
  }
  return result;
}

/* ── LOOKUP ── */
function normalizeRanks(r1, r2) {
  if (r1 === r2) return [r1, r2];
  const i1 = RANKS.indexOf(r1), i2 = RANKS.indexOf(r2);
  return i1 < i2 ? [r1, r2] : [r2, r1];
}

function handKey(r1, r2, isSuited) {
  if (r1 === r2) return r1 + r2;
  const [hi, lo] = normalizeRanks(r1, r2);
  return hi + lo + (isSuited ? "s" : "o");
}

function getActions(key) {
  if (activeMode === "open") {
    const rng = RANGES[activeStack]?.[heroPos];
    if (!rng) return ["FOLD"];
    const out = [];
    if (rng.open.has(key))     out.push("OPEN");
    if (rng.call.has(key))     out.push("CALL");
    if (rng.threebet.has(key)) out.push("3BET");
    return out.length ? out : ["FOLD"];
  }
  const rng = VSOPEN[activeStack]?.[heroPos];
  if (!rng) return ["FOLD"];
  const out = [];
  if (rng.call.has(key))     out.push("CALL");
  if (rng.threebet.has(key)) out.push("3BET");
  return out.length ? out : ["FOLD"];
}

/* ── RECOMPUTE ── */
function recompute() {
  const [r1, r2] = normalizeRanks(rank1, rank2);
  const key      = handKey(rank1, rank2, suited);
  const actions  = getActions(key);
  const PRIORITY = ["3BET","OPEN","CALL","FOLD"];
  const main     = PRIORITY.find(p => actions.includes(p)) || "FOLD";

  EL.actionsRow.innerHTML = "";
  actions.forEach(a => {
    const d = ACTION_DISPLAY[a] || ACTION_DISPLAY.FOLD;
    const s = document.createElement("span");
    s.className = "action-chip"; s.textContent = d.label; s.style.color = d.color;
    EL.actionsRow.appendChild(s);
  });

  EL.resultReason.textContent = actions.length === 1
    ? (REASON[main] || "") : "Plusieurs options jouables";

  EL.actionsRow.style.display   = "flex";
  EL.resultReason.style.display = "";
  EL.tapHint.style.display      = "";

  /* P7 — range-hint : résumé du spot entier (open pour RFI, call pour vs-open) */
  const rngSet = activeMode === "open"
    ? RANGES[activeStack]?.[heroPos]?.open
    : VSOPEN[activeStack]?.[heroPos]?.call;
  EL.rangeHint.textContent = rngSet ? buildRangeHint([...rngSet]) : "";

  /* P5 — couleur des cartes */
  applyCardColors();

  EL.centerZone.classList.add("decided");
  EL.actionsRow.classList.remove("pop-in");
  void EL.actionsRow.offsetWidth;
  EL.actionsRow.classList.add("pop-in");
}

/* ── CALIBRATION MODE ── */
function initCalibration() {
  const param = new URLSearchParams(location.search).get("cal");
  if (!param) return;
  const img = document.getElementById("cal-img");
  img.src = (param === "1") ? "winamax_ref.png"
          : (param === "blue" || param === "rail") ? "winamax_blue_overlay.png"
          : decodeURIComponent(param);
  img.style.display = "block";
  document.body.classList.add("cal-mode");
  // rail-mode: fond + overlay + rail SVG uniquement
  if (param === "blue" || param === "rail") {
    document.body.classList.add("rail-mode");
  }
  const tm = document.getElementById("test-marker");
  if (tm) tm.textContent = "CALIBRATION — " + img.src.split("/").pop();
}

window.addEventListener("DOMContentLoaded", () => { init(); initCalibration(); });
</script>
