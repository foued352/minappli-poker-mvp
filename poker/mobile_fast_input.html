<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Fast Input</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ VISUAL MARKER ══ */
    #test-marker {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #4c0099; color: #fff; font-size: 13px; font-weight: 900;
      text-align: center; padding: 7px; letter-spacing: 0.08em;
      font-family: system-ui, sans-serif;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #070c15; color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      max-width: 420px; margin: 0 auto;
      padding: 36px 16px 0;
    }

    /* ══════════════════════════════════════════
       CONTEXT — calmed down, clearly secondary
    ══════════════════════════════════════════ */
    #ctx {
      flex-shrink: 0;
      display: flex; flex-direction: column;
      gap: 3px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ctx-row { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
    .ctx-btn {
      padding: 3px 8px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.09);
      background: transparent;
      color: rgba(255,255,255,0.38);
      font-size: 10px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 0.07s, color 0.07s, border-color 0.07s;
      user-select: none;
    }
    .ctx-btn.active {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.86);
      border-color: rgba(255,255,255,0.28);
    }
    .ctx-btn:disabled { opacity: 0.18; pointer-events: none; }
    #mode-row { align-items: center; gap: 5px; }
    #vs-bar { display: flex; align-items: center; gap: 3px; margin-left: 4px; }
    .vs-lbl {
      font-size: 9px; font-weight: 600;
      color: rgba(255,255,255,0.26); letter-spacing: 0.07em; padding-right: 2px;
    }
    .opener-btn {
      padding: 3px 7px; border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.09);
      background: transparent;
      color: rgba(255,255,255,0.36);
      font-size: 10px; font-weight: 600;
      cursor: pointer; user-select: none;
      transition: background 0.07s, color 0.07s;
    }
    .opener-btn.active {
      background: rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.82);
      border-color: rgba(255,255,255,0.26);
    }

    /* ══════════════════════════════════════════
       HAND ZONE
    ══════════════════════════════════════════ */
    #hand-zone {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      padding: 12px 0 0;
    }

    #cards-zone {
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }

    /* ══════════════════════════════════════════
       CARDS
    ══════════════════════════════════════════ */
    #cards-row {
      display: flex; gap: 22px;
      align-items: flex-end; justify-content: center;
      perspective: 700px;
    }

    .card {
      width: 138px; height: 193px;
      border-radius: 14px; cursor: pointer;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      transition: transform 0.16s cubic-bezier(0.34, 1.4, 0.64, 1),
                  box-shadow 0.14s, border-color 0.12s,
                  opacity 0.14s;
    }
    .card:active { transform: scale(0.93) !important; }

    /* Idle fan */
    #hand-zone.idle #cards-row .card:first-child { transform: rotate(-5deg); }
    #hand-zone.idle #cards-row .card:last-child  { transform: rotate(5deg);  }
    #hand-zone.idle #cards-row .card:first-child:active { transform: rotate(-5deg) scale(0.93) !important; }
    #hand-zone.idle #cards-row .card:last-child:active  { transform: rotate(5deg)  scale(0.93) !important; }

    /* Passive (inactive card during picking) */
    .card.passive { opacity: 0.44; transform: scale(0.94); }

    /* Face down */
    .card[data-state="down"] {
      background: linear-gradient(155deg, #1a2336 0%, #0f1622 55%, #0c1220 100%);
      border: 1.5px solid rgba(255,255,255,0.09);
      box-shadow: 0 10px 36px rgba(0,0,0,0.60), 0 3px 8px rgba(0,0,0,0.32),
                  inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .card[data-state="down"]::before {
      content: ""; position: absolute; inset: 8px;
      border: 1px solid rgba(255,255,255,0.07); border-radius: 8px;
      background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
        transparent 1px, transparent 8px
      );
    }
    .card[data-state="down"]::after {
      content: "◆"; position: absolute;
      font-size: 22px; color: rgba(255,255,255,0.04);
    }
    .card[data-state="down"] .card-rank-center { display: none; }
    .card[data-state="down"] .card-corner-tl,
    .card[data-state="down"] .card-corner-br  { display: none; }

    /* Selecting */
    .card[data-state="selecting"] {
      background: linear-gradient(155deg, #1e2840 0%, #141d32 100%);
      border: 2px solid rgba(255,255,255,0.70);
      box-shadow: 0 0 0 5px rgba(255,255,255,0.06),
                  0 0 32px rgba(255,255,255,0.08),
                  0 12px 40px rgba(0,0,0,0.56);
    }
    .card[data-state="selecting"]::before {
      content: ""; position: absolute; inset: 8px;
      border: 1px solid rgba(255,255,255,0.14); border-radius: 8px;
    }
    /* Downward triangle — visual continuity to picker below */
    .card[data-state="selecting"]::after {
      content: "";
      position: absolute; bottom: -9px; left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(255,255,255,0.44);
    }
    .card[data-state="selecting"] .card-rank-center { display: none; }
    .card[data-state="selecting"] .card-corner-tl,
    .card[data-state="selecting"] .card-corner-br  { display: none; }

    /* Face up */
    .card[data-state="up"] {
      background: rgba(255,255,255,0.085);
      border: 1.5px solid rgba(255,255,255,0.34);
      box-shadow: 0 10px 32px rgba(0,0,0,0.48), 0 3px 10px rgba(0,0,0,0.26),
                  inset 0 1px 0 rgba(255,255,255,0.10);
    }
    @keyframes card-flip {
      0%   { transform: rotateY(80deg) scale(0.95); opacity: 0.4; }
      60%  { transform: rotateY(-6deg) scale(1.02); opacity: 1;   }
      100% { transform: rotateY(0deg)  scale(1);    opacity: 1;   }
    }
    .card.flipping { animation: card-flip 0.20s cubic-bezier(0.22, 1, 0.36, 1); }
    .card[data-state="up"] .card-rank-center {
      font-size: 52px; font-weight: 900; color: #fff;
      line-height: 1; letter-spacing: -0.02em;
    }
    .card[data-state="up"] .card-corner-tl {
      position: absolute; top: 10px; left: 12px;
      font-size: 16px; font-weight: 800;
      color: rgba(255,255,255,0.48); line-height: 1;
    }
    .card[data-state="up"] .card-corner-br {
      position: absolute; bottom: 10px; right: 12px;
      font-size: 16px; font-weight: 800;
      color: rgba(255,255,255,0.48); line-height: 1;
      transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════
       RANK PICKER — inline, attached to cards
    ══════════════════════════════════════════ */
    #rank-picker {
      display: none;
      width: 100%;
      margin-top: 12px; /* tight to card, visually attached */
    }
    @keyframes picker-appear {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    #rank-picker.active {
      display: block;
      animation: picker-appear 0.12s ease-out forwards;
    }

    #picking-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.12em; text-transform: uppercase;
      text-align: center; margin-bottom: 9px;
    }

    #rank-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }
    .rank-btn {
      width: calc((100% - 48px) / 7);
      aspect-ratio: 1; border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.88);
      font-size: clamp(16px, 5vw, 22px); font-weight: 900;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.20);
      transition: background 0.05s, transform 0.05s, border-color 0.05s;
    }
    .rank-btn:active { transform: scale(0.86); background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.36); }
    /* Drag-over — very obvious, instant */
    .rank-btn.drag-over {
      background: rgba(255,255,255,0.34) !important;
      border-color: rgba(255,255,255,1.0) !important;
      transform: scale(1.16) !important;
      box-shadow: 0 0 18px rgba(255,255,255,0.18) !important;
      color: #fff !important;
      transition: none !important;
    }

    /* ── Idle hint ── */
    #idle-hint {
      margin-top: 14px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.13);
      letter-spacing: 0.10em; text-transform: uppercase;
    }

    /* ══════════════════════════════════════════
       SUITED CHIP — between cards and result
    ══════════════════════════════════════════ */
    #suited-row {
      min-height: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-suited {
      padding: 4px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: transparent;
      color: rgba(255,255,255,0.32);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer; user-select: none;
      transition: background 0.07s, color 0.07s, border-color 0.07s;
    }
    #btn-suited.on {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.80);
      border-color: rgba(255,255,255,0.38);
    }
    #btn-suited.hidden { display: none; }

    /* ══════════════════════════════════════════
       RESULT — compact, central, clean
    ══════════════════════════════════════════ */
    #hand-result {
      display: none; flex-direction: column;
      align-items: center; gap: 5px;
      text-align: center;
    }
    #hand-result.active { display: flex; }

    /* Mini cards */
    #hand-display {
      display: flex; gap: 6px;
      align-items: center; justify-content: center;
    }
    .mini-card {
      width: 40px; height: 56px;
      border-radius: 6px; background: #eef0f5;
      box-shadow: 0 3px 10px rgba(0,0,0,0.50);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mc-rank { font-size: 18px; font-weight: 900; line-height: 1.1; color: #111827; }
    .mc-suit { font-size: 12px; line-height: 1; color: #111827; }
    .mini-card.red .mc-rank,
    .mini-card.red .mc-suit { color: #c92a2a; }

    /* Action */
    #result-text {
      font-size: clamp(52px, 15vw, 68px);
      font-weight: 900; letter-spacing: 0.04em; line-height: 1;
      transition: color 0.12s;
    }
    #result-reason {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.01em;
    }
    #result-tap-hint {
      font-size: 9px; font-weight: 500;
      color: rgba(255,255,255,0.10);
      letter-spacing: 0.04em; margin-top: 1px;
    }

    @keyframes pop-in {
      from { transform: scale(0.76); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .pop-in { animation: pop-in 0.18s cubic-bezier(0.28, 1.7, 0.58, 1); }

    /* ══════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════ */
    #link-grid {
      display: block; text-align: center;
      font-size: 10px; font-weight: 500;
      color: rgba(255,255,255,0.13); text-decoration: none;
      letter-spacing: 0.04em;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 10px 0 max(12px, env(safe-area-inset-bottom));
      flex-shrink: 0; transition: color 0.10s;
    }
    #link-grid:hover { color: rgba(255,255,255,0.30); }
  </style>
</head>
<body>

<div id="test-marker">DRAG CLARITY v1</div>

<div id="app">

  <div id="ctx">
    <div class="ctx-row" id="stack-row"></div>
    <div class="ctx-row" id="pos-row"></div>
    <div class="ctx-row" id="mode-row">
      <div id="mode-grp" style="display:flex;gap:3px;"></div>
      <div id="vs-bar" style="display:none;">
        <span class="vs-lbl">vs</span>
        <div id="opener-grp" style="display:flex;gap:3px;"></div>
      </div>
    </div>
  </div>

  <div id="hand-zone" class="idle">

    <div id="cards-zone">
      <div id="cards-row">
        <div class="card" id="card1" data-state="down">
          <span class="card-corner-tl"></span>
          <span class="card-rank-center"></span>
          <span class="card-corner-br"></span>
        </div>
        <div class="card" id="card2" data-state="down">
          <span class="card-corner-tl"></span>
          <span class="card-rank-center"></span>
          <span class="card-corner-br"></span>
        </div>
      </div>

      <div id="rank-picker">
        <div id="picking-label"></div>
        <div id="rank-grid"></div>
      </div>

      <div id="idle-hint">Touchez · glissez</div>
    </div>

    <!-- Suited chip — between cards zone and result, natural hand property -->
    <div id="suited-row">
      <button id="btn-suited" class="hidden">Suited</button>
    </div>

    <div id="hand-result">
      <div id="hand-display">
        <div class="mini-card" id="mc1">
          <span class="mc-rank"></span><span class="mc-suit"></span>
        </div>
        <div class="mini-card" id="mc2">
          <span class="mc-rank"></span><span class="mc-suit"></span>
        </div>
      </div>
      <div id="result-text"></div>
      <div id="result-reason"></div>
      <div id="result-tap-hint">tap pour recommencer</div>
    </div>

  </div>

  <a id="link-grid" href="../range_editor.html">Voir la grille</a>

</div>

<script src="../mobile_fast_input_ranges.js"></script>
<script>
"use strict";

/* ══════════════════════════════════════════
   RANGES
══════════════════════════════════════════ */
const RANGES = {};
for (const [stack, positions] of Object.entries(MFI_RANGES_RAW)) {
  RANGES[stack] = {};
  for (const [pos, buckets] of Object.entries(positions)) {
    RANGES[stack][pos] = {
      open:     new Set(buckets.open     || []),
      call:     new Set(buckets.call     || []),
      threebet: new Set(buckets.threebet || []),
    };
  }
}
const VSOPEN = {};
for (const [stack, positions] of Object.entries(MFI_VSOPEN_RAW)) {
  VSOPEN[stack] = {};
  for (const [pos, buckets] of Object.entries(positions)) {
    VSOPEN[stack][pos] = {
      call:     new Set(buckets.call     || []),
      threebet: new Set(buckets.threebet || []),
    };
  }
}

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const STACKS    = ["20bb","25bb","40bb"];
const POSITIONS = ["UTG","HJ","CO","BTN","SB","BB"];
const RANKS     = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];

const OPENER_OPTIONS = {
  UTG: [], HJ: ["UTG"], CO: ["UTG","HJ"], BTN: ["UTG","HJ","CO"],
  SB:  ["CO","BTN"], BB: ["UTG","HJ","CO","BTN","SB"],
};
const MODE_ALLOWED = {
  UTG: ["open"], HJ: ["open","vsopen"], CO: ["open","vsopen"],
  BTN: ["open","vsopen"], SB: ["open","vsopen"], BB: ["vsopen"],
};

const DISPLAY = {
  FOLD:   { label: "FOLD",  color: "#8090b8" },
  CALL:   { label: "CALL",  color: "#f5a623" },
  OPEN:   { label: "RAISE", color: "#22c55e" },
  "3BET": { label: "RAISE", color: "#22c55e" },
};
const REASON = {
  FOLD:   "Hors de la range simplifiee",
  CALL:   "Main correcte dans ce spot",
  OPEN:   "Spot standard — premiere mise",
  "3BET": "Main forte — pression maximale",
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeStack  = "40bb";
let activePos    = "BTN";
let activeMode   = "open";
let activeOpener = null;
let rank1 = null, rank2 = null;
let suited = false;
let step = "idle";

/* ══════════════════════════════════════════
   DRAG STATE
══════════════════════════════════════════ */
let dragActive  = false;
let dragHovered = null;

function beginDrag() {
  dragActive  = true;
  dragHovered = null;
  document.body.style.overflow = "hidden";
  document.addEventListener("pointermove",   onDragMove,   { passive: false });
  document.addEventListener("pointerup",     onDragEnd);
  document.addEventListener("pointercancel", onDragCancel);
}

function cleanupDrag() {
  dragActive = false;
  document.body.style.overflow = "";
  if (dragHovered) { dragHovered.classList.remove("drag-over"); dragHovered = null; }
  document.removeEventListener("pointermove",   onDragMove);
  document.removeEventListener("pointerup",     onDragEnd);
  document.removeEventListener("pointercancel", onDragCancel);
}

function onDragMove(e) {
  if (!dragActive) return;
  e.preventDefault();
  const btn = rankBtnAt(e.clientX, e.clientY);
  if (btn !== dragHovered) {
    if (dragHovered) dragHovered.classList.remove("drag-over");
    dragHovered = btn;
    if (dragHovered) dragHovered.classList.add("drag-over");
  }
}

function onDragEnd(e) {
  if (!dragActive) { cleanupDrag(); return; }
  const btn = rankBtnAt(e.clientX, e.clientY) || dragHovered;
  cleanupDrag();
  if (btn) pickRank(btn.textContent.trim());
  /* No rank reached: picker stays open for fallback tap */
}

function onDragCancel() { cleanupDrag(); }

function rankBtnAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest(".rank-btn") : null;
}

/* ══════════════════════════════════════════
   DOM REFS
══════════════════════════════════════════ */
const EL = {};

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function init() {
  EL.stackRow     = document.getElementById("stack-row");
  EL.posRow       = document.getElementById("pos-row");
  EL.modeGrp      = document.getElementById("mode-grp");
  EL.vsBar        = document.getElementById("vs-bar");
  EL.openerGrp    = document.getElementById("opener-grp");
  EL.handZone     = document.getElementById("hand-zone");
  EL.idleHint     = document.getElementById("idle-hint");
  EL.rankPicker   = document.getElementById("rank-picker");
  EL.rankGrid     = document.getElementById("rank-grid");
  EL.pickingLabel = document.getElementById("picking-label");
  EL.handResult   = document.getElementById("hand-result");
  EL.resultText   = document.getElementById("result-text");
  EL.resultReason = document.getElementById("result-reason");
  EL.mc1          = document.getElementById("mc1");
  EL.mc2          = document.getElementById("mc2");
  EL.card1        = document.getElementById("card1");
  EL.card2        = document.getElementById("card2");
  EL.btnSuited    = document.getElementById("btn-suited");

  buildStacks();
  buildPositions();
  buildModes();
  buildRankGrid();

  function bindCard(cardEl, n) {
    cardEl.addEventListener("pointerdown", (e) => {
      if (cardEl.releasePointerCapture) cardEl.releasePointerCapture(e.pointerId);
      e.preventDefault();
      onCardPointerDown(e, n);
    });
    cardEl.addEventListener("contextmenu", e => e.preventDefault());
  }
  bindCard(EL.card1, 1);
  bindCard(EL.card2, 2);
  EL.btnSuited.addEventListener("click", onSuitedToggle);

  showView("idle");
}

/* ══════════════════════════════════════════
   CARD POINTER DOWN
══════════════════════════════════════════ */
function onCardPointerDown(e, n) {
  if (step === "done") { resetCards(); return; }

  if (step === "idle") {
    startPicking1();
    beginDrag();
    return;
  }

  if (step === "picking1") {
    if (n === 1) { resetCards(); return; }
    /* card2 during picking1 — re-activate drag */
    beginDrag();
    return;
  }

  if (step === "picking2") {
    if (n === 2) { beginDrag(); return; }
    /* card1 during picking2 — back to picking1 */
    rank2 = null; step = "picking1";
    setCard(EL.card2, "down", null);
    setCard(EL.card1, "selecting", null);
    EL.card2.classList.add("passive");
    EL.card1.classList.remove("passive");
    EL.btnSuited.classList.add("hidden");
    EL.pickingLabel.textContent = "Carte 1";
    beginDrag();
    return;
  }
}

/* ══════════════════════════════════════════
   BUILD CONTEXT
══════════════════════════════════════════ */
function buildStacks() {
  EL.stackRow.innerHTML = "";
  STACKS.forEach(s => {
    const b = mkBtn(s, "ctx-btn" + (s === activeStack ? " active" : ""), () => {
      activeStack = s; setActive(EL.stackRow, s);
      if (step === "done") recompute();
    });
    EL.stackRow.appendChild(b);
  });
}

function buildPositions() {
  EL.posRow.innerHTML = "";
  POSITIONS.forEach(p => {
    const b = mkBtn(p, "ctx-btn" + (p === activePos ? " active" : ""), () => {
      activePos = p; setActive(EL.posRow, p);
      fixMode(); updateVsBar();
      if (step === "done") recompute();
    });
    EL.posRow.appendChild(b);
  });
}

function buildModes() {
  EL.modeGrp.innerHTML = "";
  [["open","OPEN"],["vsopen","VS OPEN"]].forEach(([m, label]) => {
    const b = mkBtn(label, "ctx-btn" + (m === activeMode ? " active" : ""), () => {
      activeMode = m; setActive(EL.modeGrp, label);
      updateVsBar();
      if (step === "done") recompute();
    });
    b.dataset.mode = m;
    EL.modeGrp.appendChild(b);
  });
  fixMode();
}

function buildRankGrid() {
  EL.rankGrid.querySelectorAll(".rank-btn").forEach(b => b.remove());
  RANKS.forEach(r => {
    const b = mkBtn(r, "rank-btn", () => pickRank(r));
    EL.rankGrid.appendChild(b);
  });
}

function mkBtn(text, className, onClick) {
  const b = document.createElement("button");
  b.className = className; b.textContent = text;
  b.addEventListener("click", onClick);
  return b;
}

function setActive(container, text) {
  container.querySelectorAll(".ctx-btn").forEach(b => {
    b.classList.toggle("active", b.textContent === text);
  });
}

function fixMode() {
  const allowed = MODE_ALLOWED[activePos] || ["open"];
  EL.modeGrp.querySelectorAll(".ctx-btn").forEach(b => {
    const m = b.dataset.mode;
    b.disabled = !allowed.includes(m);
    if (b.disabled && b.classList.contains("active")) {
      const fallback = allowed[0];
      activeMode = fallback;
      setActive(EL.modeGrp, fallback === "open" ? "OPEN" : "VS OPEN");
    }
  });
}

function updateVsBar() {
  const opts = OPENER_OPTIONS[activePos] || [];
  if (activeMode !== "vsopen" || opts.length === 0) {
    EL.vsBar.style.display = "none"; return;
  }
  EL.vsBar.style.display = "flex";
  if (!opts.includes(activeOpener)) activeOpener = opts[opts.length - 1];
  EL.openerGrp.innerHTML = "";
  opts.forEach(op => {
    const b = mkBtn(op, "opener-btn" + (op === activeOpener ? " active" : ""), () => {
      activeOpener = op;
      EL.openerGrp.querySelectorAll(".opener-btn").forEach(x => {
        x.classList.toggle("active", x.textContent === op);
      });
      if (step === "done") recompute();
    });
    EL.openerGrp.appendChild(b);
  });
}

/* ══════════════════════════════════════════
   VIEWS
══════════════════════════════════════════ */
function showView(view) {
  EL.handZone.classList.toggle("idle", view === "idle");
  EL.idleHint.style.display = view === "idle" ? "" : "none";
  if (view === "picking") {
    EL.rankPicker.classList.add("active");
  } else {
    EL.rankPicker.classList.remove("active");
  }
  EL.handResult.classList.toggle("active", view === "result");
}

/* ══════════════════════════════════════════
   PICKING FLOW
══════════════════════════════════════════ */
function startPicking1() {
  rank1 = null; rank2 = null; suited = false;
  step = "picking1";
  setCard(EL.card1, "selecting", null);
  setCard(EL.card2, "down", null);
  /* card2 visually dims — not the active card */
  EL.card1.classList.remove("passive");
  EL.card2.classList.add("passive");
  EL.btnSuited.classList.add("hidden");
  EL.btnSuited.classList.remove("on");
  EL.pickingLabel.textContent = "Carte 1";
  showView("picking");
}

function pickRank(rank) {
  if (step === "picking1") {
    rank1 = rank;
    setCard(EL.card1, "up", rank);
    step = "picking2";
    setCard(EL.card2, "selecting", null);
    /* card2 now active — remove passive */
    EL.card1.classList.remove("passive");
    EL.card2.classList.remove("passive");
    EL.pickingLabel.textContent = "Carte 2";
    EL.btnSuited.classList.remove("hidden");
    if (suited) EL.btnSuited.classList.add("on");
    return;
  }
  if (step === "picking2") {
    rank2 = rank;
    if (rank1 === rank2) {
      suited = false;
      EL.btnSuited.classList.remove("on");
      EL.btnSuited.classList.add("hidden");
    }
    setCard(EL.card2, "up", rank);
    step = "done";
    recompute();
    return;
  }
}

function setCard(el, state, rank) {
  const wasDown = el.dataset.state !== "up";
  el.dataset.state = state;
  const rankEl = el.querySelector(".card-rank-center");
  const tlEl   = el.querySelector(".card-corner-tl");
  const brEl   = el.querySelector(".card-corner-br");
  if (state === "up" && rank) {
    rankEl.textContent = rank;
    tlEl.textContent   = rank;
    brEl.textContent   = rank;
    if (wasDown) {
      el.classList.remove("flipping");
      void el.offsetWidth;
      el.classList.add("flipping");
    }
  } else {
    rankEl.textContent = "";
    tlEl.textContent   = "";
    brEl.textContent   = "";
    el.classList.remove("flipping");
  }
}

function onSuitedToggle() {
  if (rank1 === rank2 && rank1 !== null) return;
  suited = !suited;
  EL.btnSuited.classList.toggle("on", suited);
  if (step === "done") recompute();
}

function resetCards() {
  rank1 = null; rank2 = null; suited = false;
  step = "idle";
  setCard(EL.card1, "down", null);
  setCard(EL.card2, "down", null);
  EL.card1.classList.remove("passive");
  EL.card2.classList.remove("passive");
  EL.btnSuited.classList.remove("on");
  EL.btnSuited.classList.add("hidden");
  showView("idle");
}

/* ══════════════════════════════════════════
   RANGE LOOKUP
══════════════════════════════════════════ */
function handKey(r1, r2, isSuited) {
  if (r1 === r2) return r1 + r2;
  const i1 = RANKS.indexOf(r1), i2 = RANKS.indexOf(r2);
  const hi = i1 < i2 ? r1 : r2;
  const lo = i1 < i2 ? r2 : r1;
  return hi + lo + (isSuited ? "s" : "o");
}

function getActions(key) {
  if (activeMode === "open") {
    const rng = RANGES[activeStack]?.[activePos];
    if (!rng) return ["FOLD"];
    const out = [];
    if (rng.open.has(key))     out.push("OPEN");
    if (rng.call.has(key))     out.push("CALL");
    if (rng.threebet.has(key)) out.push("3BET");
    return out.length ? out : ["FOLD"];
  }
  const rng = VSOPEN[activeStack]?.[activePos];
  if (!rng) return ["FOLD"];
  const out = [];
  if (rng.call.has(key))     out.push("CALL");
  if (rng.threebet.has(key)) out.push("3BET");
  return out.length ? out : ["FOLD"];
}

/* ══════════════════════════════════════════
   MINI CARDS
══════════════════════════════════════════ */
function getMiniCardData(r1, r2, isSuited) {
  if (r1 === r2) return [
    { rank: r1, suit: "\u2660", red: false },
    { rank: r2, suit: "\u2665", red: true  },
  ];
  if (isSuited) return [
    { rank: r1, suit: "\u2660", red: false },
    { rank: r2, suit: "\u2660", red: false },
  ];
  return [
    { rank: r1, suit: "\u2660", red: false },
    { rank: r2, suit: "\u2666", red: true  },
  ];
}

function updateMiniCards(r1, r2, isSuited) {
  const data = getMiniCardData(r1, r2, isSuited);
  [EL.mc1, EL.mc2].forEach((mc, i) => {
    mc.querySelector(".mc-rank").textContent = data[i].rank;
    mc.querySelector(".mc-suit").textContent = data[i].suit;
    mc.classList.toggle("red", data[i].red);
  });
}

/* ══════════════════════════════════════════
   RESULT
══════════════════════════════════════════ */
function recompute() {
  const key     = handKey(rank1, rank2, suited);
  const actions = getActions(key);

  updateMiniCards(rank1, rank2, suited);

  const PRIORITY = ["3BET","OPEN","CALL","FOLD"];
  const main = PRIORITY.find(p => actions.includes(p)) || "FOLD";
  const d = DISPLAY[main] || DISPLAY.FOLD;

  const labels = [...new Set(actions.map(a => DISPLAY[a]?.label || a))];
  EL.resultText.textContent = labels.join(" / ");
  EL.resultText.style.color = d.color;

  EL.resultReason.textContent = actions.length === 1
    ? (REASON[main] || "")
    : "Plusieurs options jouables";

  EL.handResult.classList.remove("pop-in");
  void EL.handResult.offsetWidth;
  EL.handResult.classList.add("pop-in");

  showView("result");
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
