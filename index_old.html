<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minappli — Poker Ranges</title>
  <style>
    body { margin: 0; background: #090e14; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #wrap { padding: 12px; display:flex; flex-direction:column; gap:12px; align-items:flex-start; }
    #mainLayout { display:flex; gap:16px; align-items:flex-start; }
    #mainLeft { display:flex; flex-direction:column; gap:8px; }
    #mainRight { flex-shrink:0; }
    canvas { display:block; background:#0c1219; border:1px solid rgba(255,255,255,0.08); border-radius: 12px; }
    .action-btn { padding:4px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.16); background:#141a22; color:rgba(255,255,255,0.40); cursor:pointer; font-size:12px; }
    .action-btn.active { color:#fff; border-color:rgba(255,255,255,0.55); background:#1e2a3a; font-weight:bold; }
    #toolbar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; width:1000px; opacity:0.60; }
    #toolbar:hover { opacity:1; transition:opacity 0.18s; }
    #tools-drawer summary { cursor:pointer; color:rgba(255,255,255,0.28); font-size:10px; user-select:none; list-style:none; padding:2px 7px; border:1px solid rgba(255,255,255,0.1); border-radius:5px; display:inline-block; }
    #tools-drawer summary::-webkit-details-marker { display:none; }
    #tools-drawer > div { margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; padding:6px 10px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:8px; }
    #contextBar { padding:20px 28px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-top:1px solid rgba(255,255,255,0.05); border-radius:12px; font-size:13px; width:800px; box-sizing:border-box; }
    #rangePanel { border:none; border-radius:0; background:transparent !important; }
  </style>
</head>
<body>
  <div id="wrap">

    <div id="toolbar">
      <button id="reset" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.15);background:#141a22;color:rgba(255,255,255,0.45);cursor:pointer;font-size:12px;">Reset</button>
      <button id="copyRange" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.15);background:#141a22;color:rgba(255,255,255,0.45);cursor:pointer;font-size:12px;">Copy JSON</button>

      <span id="actionSelector" style="display:inline-flex;gap:4px;align-items:center;">
        <button data-action="open"     class="action-btn active">OPEN (1)</button>
        <button data-action="call"     class="action-btn">CALL (2)</button>
        <button data-action="threebet" class="action-btn">3BET (3)</button>
      </span>

      <details id="tools-drawer">
        <summary>pack ▾</summary>
        <div>
          <select id="rangeSelector"><option value="default">Default</option></select>
          <button id="newRange">New range</button>
          <button id="clonePack">Clone pack</button>
          <button id="renamePack">Rename pack</button>
          <button id="deletePack">Delete pack</button>
          <button id="exportRanges">Export ranges</button>
          <button id="importRanges">Import ranges</button>
          <button id="exportPack">Export pack</button>
          <button id="importPack">Import pack</button>
        </div>
      </details>
    </div>

    <div id="mainLayout">
      <div id="mainLeft">
        <div id="contextBar" style="display:none;"></div>
        <canvas id="stage" width="800" height="600"></canvas>
        <pre id="rangePreview" style="display:none;margin-top:4px;padding:8px 12px;background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#7dd3fc;font-size:11px;white-space:pre-wrap;"></pre>
      </div>
      <div id="mainRight">
        <canvas id="rangePanel" width="380" height="600" style="background:transparent;"></canvas>
      </div>
    </div>

  </div>
  <!-- Sélecteur stack HUD (ouvert au clic sur le label 40BB dans l'îlot central) -->
  <div id="stackPopup" style="display:none;position:fixed;z-index:202;background:rgba(4,8,16,0.96);border:1px solid rgba(255,255,255,0.10);border-radius:8px;padding:5px 0;box-shadow:0 6px 24px rgba(0,0,0,0.62);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;min-width:148px;"></div>

  <!-- Panneau notes de study (ouvert au clic droit sur un siège) -->
  <div id="notePanel" style="display:none;position:fixed;z-index:200;background:rgba(4,8,16,0.96);border:1px solid rgba(255,255,255,0.10);border-radius:10px;padding:14px 16px;width:232px;box-shadow:0 8px 28px rgba(0,0,0,0.65);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span id="notePosLabel" style="font-weight:700;font-size:15px;color:#fbbf24;letter-spacing:0.04em;"></span>
      <span id="noteCloseBtn" style="cursor:pointer;color:rgba(255,255,255,0.35);font-size:16px;line-height:1;padding:2px 6px;user-select:none;" title="Fermer (Esc)">&#x2715;</span>
    </div>
    <textarea id="noteTextarea" placeholder="Notes de study…" style="width:100%;height:96px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:6px;color:rgba(255,255,255,0.88);font-size:12px;line-height:1.55;font-family:inherit;padding:8px 10px;resize:vertical;box-sizing:border-box;outline:none;caret-color:#fbbf24;"></textarea>
    <p style="margin:7px 0 0;font-size:10px;color:rgba(255,255,255,0.22);text-align:right;">Sauvegardé automatiquement · Échap pour fermer</p>
  </div>

  <script type="module" src="./runner.mjs"></script>
</body>
</html>
